name: Importar PAC 2026 a base de datos

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: 'DATABASE_URL de Neon PostgreSQL'
        required: true
        type: string

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar importación PAC
        env:
          DATABASE_URL: ${{ inputs.database_url }}
        run: node scripts/import-pac.mjs
